<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVocabApp - Ultimate Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg-body: #0f172a; --bg-surface: #1e293b; --primary: #38bdf8; 
            --primary-hover: #0ea5e9; --secondary: #10b981; --text-main: #f8fafc;
            --text-dim: #94a3b8; --wrong: #f43f5e;
            --glass: rgba(30, 41, 59, 0.7);
        }
        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top left, #1e293b, #0f172a); color: var(--text-main); margin: 0; min-height: 100vh; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .page { display: none; animation: pageEnter 0.4s ease forwards; }
        .page.active { display: block; }
        @keyframes pageEnter { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(255, 255, 255, 0.05); background: rgba(15, 23, 42, 0.6); color: white; outline: none; margin-bottom: 10px; }
        input:focus { border-color: var(--primary); }

        .btn-base { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: #0f172a; }
        .btn-outline { background: transparent; color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
        
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; }
        .folder-item { cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); position: relative; }
        .folder-item:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .manual-input-row { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 10px; margin-bottom: 12px; align-items: center; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 14px; }
        .btn-remove-row { background: rgba(244, 63, 94, 0.1); color: var(--wrong); width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        
        .tab-group { display: inline-flex; background: rgba(0, 0, 0, 0.2); padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 20px; border-radius: 8px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--bg-surface); color: var(--primary); }

        .count-pill { font-size: 0.7rem; font-weight: 800; background: rgba(56, 189, 248, 0.15); padding: 4px 10px; border-radius: 10px; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="page-home" class="page active">
        <div class="glass-card" style="margin-bottom: 40px;">
            <h2 style="margin-top:0; color: var(--primary);">TỪ ĐIỂN NHANH</h2>
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-input" placeholder="Nhập từ cần tra..." onkeypress="if(event.key==='Enter') searchWord()">
                <button class="btn-base btn-primary" onclick="searchWord()">TRA TỪ</button>
            </div>
            <div id="dict-result" style="margin-top:20px; display:none;"></div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 style="margin:0;">Thư viện cá nhân</h2>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Chọn một bộ từ để bắt đầu học</p>
            </div>
            <button class="btn-base btn-primary" onclick="prepareAddPage()">+ TẠO NHÓM MỚI</button>
        </div>
        <div id="folder-list" class="folder-grid"></div>
    </div>

    <div id="page-add" class="page">
        <button class="btn-base btn-outline" style="margin-bottom: 20px;" onclick="switchPage('page-home')">← QUAY LẠI</button>
        <div class="glass-card">
            <h2 id="add-title">Thiết lập bộ từ</h2>
            <input type="text" id="new-group-name" placeholder="Tên bộ từ...">
            
            <div class="tab-group">
                <button class="tab-btn active" id="t-bulk" onclick="
